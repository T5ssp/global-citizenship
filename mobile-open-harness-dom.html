<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
    <meta charset="utf-8">
    <title>Mobile TOC Harness</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #0f172a;
        }
        iframe {
            width: 390px;
            height: 2200px;
            border: 0;
            display: block;
            margin: 0 auto;
            background: #fff;
        }
    </style>
</head>
<body>
    <iframe id="preview" src="file:///C:/Users/HP/Desktop/My-Website/index.html"></iframe>
    <script>
        (function() {
            var frame = document.getElementById('preview');
            frame.addEventListener('load', function() {
                window.setTimeout(function() {
                    try {
                        var doc = frame.contentDocument || frame.contentWindow.document;
                        var button = doc.getElementById('tocToggle');
                        if (button && button.getAttribute('aria-expanded') === 'false') {
                            button.click();
                        }
                    } catch (error) {
                        console.error(error);
                    }
                }, 1200);
            });
        })();
    </script>


</body></html>
